services:
  - type: web
    name: trading-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.presentation.api.orderbook_api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: KIS_APP_KEY
        sync: false
      - key: KIS_APP_SECRET
        sync: false
      - key: KIS_ACCOUNT_NO
        sync: false
      - key: KIS_BASE_URL
        value: https://openapi.koreainvestment.com:9443
      - key: KIS_WS_URL
        value: ws://ops.koreainvestment.com:31000
      - key: WATCH_STOCKS
        value: 000660,005930,047040,263750,015760
